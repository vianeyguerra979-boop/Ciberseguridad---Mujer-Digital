<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header>
        <h1>Cafetería Tokoy Tokoy</h1>
        <img src="img/logo 3.png" alt="logo de la cafetería" class="logo">
        <p>Descubre su sabor</p>        
    </header>
    
    <main>
        <section>
        <p>El lugar perfecto para disfrutar de un buen frappé.</p>
        <img src="img/Local.jpg" alt="es la fachada de mi cafetería">
        </section>
    
    

        <section>
            <h2>Menú</h2>
            <p>Descubre nuestra selección de bebidas y postres favoritos.</p>
            <img src="img/Menu.png" alt="Menú de la cafetería">
        </section>

    </main>

    <div id="carouselExample" class="carousel slide">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="img/Frappes 1.jpg" class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="img/imagen 5.jpg" class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="img/Frappes 2.jpg" class="d-block w-100" alt="...">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>







    <footer>
        <h3>Contacto</h3>        
        <ul>
            <li>Teléfono: 123-456-7890</li>            
            <li> <a href="https://www.facebook.com/share/1BVLbD1VKK/">Comprar</a> </li>
        </ul>
    </footer>
</body>
